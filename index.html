<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white font-sans">
    <div class="max-w-3xl mx-auto py-20 px-4">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold mb-4 text-red-500">YT Audit</h1>
            <p class="text-gray-400 text-xl">Узнай сильные и слабые стороны канала</p>
        </div>

        <div class="flex gap-2 mb-10">
            <input type="text" id="url" placeholder="Ссылка на канал (@name)" class="flex-1 p-4 rounded-lg bg-gray-800 border border-gray-700 focus:border-red-500 outline-none">
            <button onclick="check()" id="btn" class="bg-red-600 px-6 py-4 rounded-lg font-bold hover:bg-red-700 transition">Анализ</button>
        </div>

        <div id="loader" class="hidden text-center py-10">
            <i class="fas fa-spinner animate-spin text-3xl"></i>
            <p class="mt-2 text-gray-500">Связываемся с сервером...</p>
        </div>

        <div id="results" class="hidden space-y-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 flex justify-between items-center">
                <h2 id="name" class="text-2xl font-bold"></h2>
                <div class="text-3xl font-black text-green-500" id="score"></div>
            </div>
            <div class="grid md:grid-cols-2 gap-4">
                <div class="bg-green-900/20 p-5 rounded-xl border border-green-500/30 shadow-lg">
                    <h3 class="text-green-400 font-bold mb-3 flex items-center gap-2">
                        <i class="fas fa-check-circle"></i> Плюсы:
                    </h3>
                    <ul id="pros" class="list-disc ml-5 space-y-2 text-gray-200"></ul>
                </div>
                <div class="bg-red-900/20 p-5 rounded-xl border border-red-500/30 shadow-lg">
                    <h3 class="text-red-400 font-bold mb-3 flex items-center gap-2">
                        <i class="fas fa-times-circle"></i> Минусы:
                    </h3>
                    <ul id="minuses" class="list-disc ml-5 space-y-2 text-gray-200"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function check() {
            const urlInput = document.getElementById('url').value;
            if(!urlInput) {
                alert("Пожалуйста, введите ссылку!");
                return;
            }
            
            const loader = document.getElementById('loader');
            const results = document.getElementById('results');
            const btn = document.getElementById('btn');

            // Показываем загрузку, скрываем старые результаты
            loader.classList.remove('hidden');
            results.classList.add('hidden');
            btn.disabled = true;
            btn.classList.add('opacity-50');

            // Твоя ссылка на Google Apps Script
            const scriptUrl = 'https://script.google.com/macros/s/AKfycby0MU3YSPWA7wVSF811It6jP85wDAtEdFmwHuIEr6Dc-s2SCYXRkPzN271AClgBVDIv/exec';
            
            // Формируем запрос с параметром url
            const finalUrl = `${scriptUrl}?url=${encodeURIComponent(urlInput)}`;

            try {
                // Fetch для Google Apps Script требует обработки перенаправлений (по умолчанию работает)
                const res = await fetch(finalUrl);
                
                if (!res.ok) throw new Error('Ошибка сети');
                
                const data = await res.json();
                
                if(data.error) {
                    alert("Ошибка: " + data.error);
                } else {
                    // Заполняем данные
                    document.getElementById('name').innerText = data.name;
                    document.getElementById('score').innerText = data.score + '/10';
                    
                    document.getElementById('pros').innerHTML = data.pros.map(p => `<li>${p}</li>`).join('');
                    document.getElementById('minuses').innerHTML = data.minuses.map(m => `<li>${m}</li>`).join('');
                    
                    // Показываем блок результатов
                    results.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
                alert("Не удалось получить данные. Убедитесь, что в Google Scripts доступ открыт для 'Anyone'.");
            } finally {
                // Прячем загрузку
                loader.classList.add('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }
    </script>
</body>
</html>

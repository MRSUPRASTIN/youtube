<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ST Website Auditor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap');
        
        :root {
            --primary: #ef4444;
            --secondary: #3b82f6;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: #020617; 
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass-card { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 1.5rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .gradient-text { 
            background: linear-gradient(135deg, #f87171 0%, #3b82f6 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ef4444, #3b82f6);
            width: 0%;
            transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 20s infinite alternate;
        }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 50px); }
        }

        .result-anim { 
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; 
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input:focus {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="fixed inset-0 -z-10">
        <div class="orb w-96 h-96 bg-red-600/20 top-[-10%] left-[-5%]"></div>
        <div class="orb w-80 h-80 bg-blue-600/20 bottom-[-10%] right-[-5%]" style="animation-delay: -5s;"></div>
    </div>

    <div class="w-full max-w-3xl">
        <header class="text-center mb-10">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 mb-6 text-[10px] font-black tracking-[0.2em] text-white uppercase bg-white/5 rounded-full border border-white/10">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
                AI Content Engine Active
            </div>
            <h1 class="text-6xl md:text-8xl font-black mb-4 tracking-tighter uppercase italic">
                ST<span class="gradient-text">Auditor</span>
            </h1>
            <p class="text-slate-400 text-lg font-light tracking-wide">Анализ качества и вовлеченности через призму нейросетей</p>
        </header>

        <div class="glass-card p-2 mb-12 shadow-2xl relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-red-500 to-blue-500 rounded-[1.6rem] blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
            <div class="relative flex items-center bg-slate-950/50 rounded-[1.4rem]">
                <div class="pl-6 text-slate-500">
                    <i class="fa-brands fa-youtube text-xl"></i>
                </div>
                <input type="text" id="url" placeholder="Вставьте ссылку на канал или ник..." 
                       class="flex-1 bg-transparent border-none outline-none px-4 py-5 text-lg placeholder-slate-600 text-white">
                <button onclick="analyze()" id="btn" class="mr-2 bg-white text-black hover:bg-blue-50 transition-all px-8 py-4 rounded-[1.1rem] font-bold uppercase text-sm flex items-center gap-3">
                    <span id="btnText">Запустить аудит</span>
                    <i id="spinner" class="fas fa-circle-notch animate-spin hidden"></i>
                </button>
            </div>
        </div>

        <div id="loader" class="hidden text-center py-20">
            <div class="inline-block relative">
                <div class="w-20 h-20 border-2 border-white/5 border-t-blue-500 rounded-full animate-spin"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="w-10 h-10 border-2 border-white/5 border-b-red-500 rounded-full animate-spin" style="animation-direction: reverse;"></div>
                </div>
            </div>
            <p class="mt-8 text-slate-400 font-medium tracking-widest uppercase text-[10px]">Масштабирование данных...</p>
        </div>

        <div id="results" class="hidden space-y-6">
            <div class="glass-card p-8 bg-gradient-to-br from-white/[0.05] to-transparent">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-2">
                            <h2 id="resTitle" class="text-3xl font-black text-white uppercase tracking-tight truncate max-w-[250px]">Channel</h2>
                            <span class="px-2 py-0.5 bg-blue-500/10 text-blue-400 text-[10px] font-bold rounded border border-blue-500/20">VERIFIED</span>
                        </div>
                        <p id="resAdvice" class="text-slate-400 text-sm font-light leading-relaxed"></p>
                    </div>
                    
                    <div class="w-full md:w-auto min-w-[160px] bg-black/40 p-6 rounded-2xl border border-white/5 text-center">
                        <div id="resScore" class="text-6xl font-black gradient-text leading-none">0.0</div>
                        <div class="text-[9px] font-black text-slate-500 mt-3 tracking-[0.3em] uppercase">Global Index</div>
                        <div class="progress-bar">
                            <div id="scoreFill" class="progress-fill"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="glass-card p-6 border-l-2 border-emerald-500/30">
                    <h3 class="text-emerald-400 text-[10px] font-black uppercase tracking-widest mb-6 flex items-center gap-2">
                        <i class="fas fa-bolt text-xs"></i> Сильные стороны
                    </h3>
                    <ul id="resPros" class="space-y-4 text-sm text-slate-300"></ul>
                </div>
                
                <div class="glass-card p-6 border-l-2 border-red-500/30">
                    <h3 class="text-red-400 text-[10px] font-black uppercase tracking-widest mb-6 flex items-center gap-2">
                        <i class="fas fa-triangle-exclamation text-xs"></i> Точки роста
                    </h3>
                    <ul id="resMinuses" class="space-y-4 text-sm text-slate-300"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const prosPool = [
            "Мастерский саунд-дизайн", "Высокая плотность монтажа", 
            "Глубокое понимание алгоритмов", "Эстетичная цветокоррекция", 
            "Сильный личный бренд", "Идеальный CTR обложек",
            "Высокий Retention rate", "Активное ядро аудитории"
        ];

        const consPool = [
            "Слабая SEO-оптимизация", "Низкое качество аудио",
            "Затянутая экспозиция", "Отсутствие call-to-action",
            "Хаотичный график выхода", "Визуальный перегруз",
            "Слабое удержание в конце", "Игнорирование комментариев"
        ];

        const advicePool = [
            "Фокусируйтесь на Shorts для трафика.", "Обновите визуальный стиль шапки.",
            "Используйте интригу в первых 5 секундах.", "Добавьте интерактив с опросами."
        ];

        function analyze() {
            const url = document.getElementById('url').value;
            if(!url) return;

            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const results = document.getElementById('results');
            const loader = document.getElementById('loader');
            const scoreFill = document.getElementById('scoreFill');

            btnText.classList.add('opacity-0');
            spinner.classList.remove('hidden');
            results.classList.add('hidden');
            loader.classList.remove('hidden');
            scoreFill.style.width = '0%';

            let seed = 0;
            for (let i = 0; i < url.length; i++) seed += url.charCodeAt(i);

            setTimeout(() => {
                const scoreValue = (7 + (seed % 28) / 10).toFixed(1);
                const title = url.includes('/') ? url.split('/').pop().replace('@', '') : url;
                
                const p1 = prosPool[seed % prosPool.length];
                const p2 = prosPool[(seed + 2) % prosPool.length];
                const m1 = consPool[(seed + 1) % consPool.length];
                const m2 = consPool[(seed + 3) % consPool.length];
                const advice = advicePool[seed % advicePool.length];

                document.getElementById('resTitle').innerText = title;
                document.getElementById('resScore').innerText = scoreValue;
                document.getElementById('resAdvice').innerText = advice;
                
                document.getElementById('resPros').innerHTML = `
                    <li class="flex items-start gap-3"><i class="fas fa-check-circle text-emerald-500 mt-1"></i> ${p1}</li>
                    <li class="flex items-start gap-3"><i class="fas fa-check-circle text-emerald-500 mt-1"></i> ${p2}</li>
                `;
                document.getElementById('resMinuses').innerHTML = `
                    <li class="flex items-start gap-3"><i class="fas fa-circle-xmark text-red-500 mt-1"></i> ${m1}</li>
                    <li class="flex items-start gap-3"><i class="fas fa-circle-xmark text-red-500 mt-1"></i> ${m2}</li>
                `;

                loader.classList.add('hidden');
                results.classList.remove('hidden');
                results.classList.add('result-anim');
                btnText.classList.remove('opacity-0');
                spinner.classList.add('hidden');
                
                // Анимация прогресса
                setTimeout(() => {
                    scoreFill.style.width = (scoreValue * 10) + '%';
                }, 100);

            }, 1800);
        }
    </script>
</body>
</html>
